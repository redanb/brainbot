name: WorldQuant Brain Alpha Factory 24/7

on:
  schedule:
    - cron: '0 0 * * *' # Run once daily at UTC midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  hypothesize_alpha:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Orthogonal Hypothesis Factory
        env:
          BRAIN_EMAIL: ${{ secrets.BRAIN_EMAIL }}
          BRAIN_PASSWORD: ${{ secrets.BRAIN_PASSWORD }}
        run: python alpha_factory.py
