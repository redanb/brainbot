name: WorldQuant Brain Alpha Factory 24/7

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch: # Allow manual trigger

env:
  # RCA-3: Force all JavaScript actions to Node.js 24 globally
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: "node24"

jobs:
  hypothesize_alpha:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker_id: [1, 2, 3, 4, 5]
    
    env:
      BRAIN_EMAIL: ${{ secrets.BRAIN_EMAIL }}
      BRAIN_PASSWORD: ${{ secrets.BRAIN_PASSWORD }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WORKER_ID: ${{ matrix.worker_id }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Orthogonal Hypothesis Factory
        # RCA-1: continue-on-error so reporting agents always run
        continue-on-error: true
        run: python alpha_factory.py

      - name: Sentinel Agent Reporting
        if: always()
        env:
          WORKFLOW_STATUS: ${{ job.status }}
        run: python sentinel_agent.py

      - name: Auto-Healer Feedback Loop
        # RCA-4: Run auto-healer on failure to analyze and fix
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python gha_auto_healer.py || echo "Auto-healer completed (errors logged)"

